# Solid State Digest - Source Configuration

# Use broad battery keywords to cast a wide net - the LLM curator handles solid-state filtering
keywords:
  en:
    - battery
    - energy storage
    - solid-state
    - solid state
    - lithium
    - sodium-ion
    - sodium ion
    - EV battery
    - cathode
    - anode
    - electrolyte
    - cell-to-pack
    - CATL
    - BYD
    - LFP
    - NMC
    - LG Energy
    - Samsung SDI
    - Panasonic Energy
    - SK On
    - QuantumScape
    - Solid Power
    - ProLogium
    - wh/kg
    - kwh
    - gigafactory
    - battery recycling
    - Toyota battery
    - condensed battery
    - semi-solid
    - dry electrode
  zh:
    - 电池
    - 储能
    - 固态
    - 锂
    - 钠离子
    - 正极
    - 负极
    - 电解质
    - 动力电池
    - 宁德时代
    - 比亚迪
    - 亿纬锂能
    - 国轩高科
    - 中创新航
    - 蜂巢能源
    - 赣锋锂业
    - 电芯
    - 固态电池
    - 全固态
    - 半固态
    - 凝聚态

# Same sources as main site - the keyword filter narrows to solid-state topics
sources:
  # --- English sources ---
  - name: "Electrek"
    url: "https://electrek.co/feed/"
    type: rss
    language: en
    enabled: true

  - name: "CnEVPost"
    url: "https://cnevpost.com/"
    type: html
    language: en
    enabled: true
    selectors:
      article_list: "li"
      title: "h3 a"
      link: "h3 a"
      snippet: "p"

  - name: "InsideEVs"
    url: "https://insideevs.com/rss/news/all/"
    type: rss
    language: en
    enabled: true

  - name: "CleanTechnica"
    url: "https://cleantechnica.com/feed/"
    type: rss
    language: en
    enabled: true

  # --- Chinese sources ---
  - name: "36氪"
    url: "https://36kr.com/feed"
    type: rss
    language: zh
    enabled: true

  - name: "36氪Web"
    url: "https://36kr.com/information/web_news/"
    type: html
    language: zh
    enabled: true
    selectors:
      article_list: "a.article-item-title"
      title: ""
      link: ""
      snippet: ""

  - name: "第一电动"
    url: "https://www.d1ev.com/news"
    type: html
    language: zh
    enabled: true
    selectors:
      article_list: "div.ws-news a[href*='/news/']"
      title: ""
      link: ""
      snippet: ""

  - name: "OFweek锂电"
    url: "https://libattery.ofweek.com/"
    type: html
    language: zh
    enabled: true
    ssl_verify: false
    selectors:
      article_list: "a[href*='/ART-']"
      title: ""
      link: ""
      snippet: ""

  # --- Solid-state company PR feeds ---
  - name: "ProLogium"
    url: "https://prologium.com/feed/"
    type: rss
    language: en
    enabled: true

  - name: "Blue Solutions"
    url: "https://www.blue-solutions.com/feed/"
    type: rss
    language: en
    enabled: true

  - name: "QuantumScape"
    url: "https://www.quantumscape.com/press-releases"
    type: html
    language: en
    enabled: false  # 403 Forbidden - site blocks scrapers
    selectors:
      article_list: "a:has(h1.ae-element-post-title)"
      title: "h1"
      link: ""
      snippet: ""

  - name: "Google News Solid-State"
    url: "https://news.google.com/rss/search?q=%22solid-state+battery%22+OR+%22solid+state+battery%22+OR+QuantumScape+OR+%22Solid+Power%22&hl=en-US&gl=US&ceid=US:en"
    type: rss
    language: en
    enabled: true

# HTTP config
http:
  timeout: 15
  max_retries: 2
  user_agent: "SolidStateDigest/1.0 (news aggregator)"
