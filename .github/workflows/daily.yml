name: Daily Battery Digest

on:
  schedule:
    # Run at 7 AM CDT (12:00 UTC) - 1 hour before email goes out
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape news
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/scrape.py

      - name: Curate digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/curate.py

      - name: Build site
        run: python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/digests/ data/raw/
          git diff --staged --quiet || git commit -m "Daily digest $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
